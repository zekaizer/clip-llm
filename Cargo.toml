[package]
name = "clip-llm"
version = "0.1.0"
edition = "2021"

[dependencies]
global-hotkey = "0.6"
arboard = "3"
reqwest = { version = "0.12", features = ["rustls-tls", "blocking", "json"], default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
regex = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
